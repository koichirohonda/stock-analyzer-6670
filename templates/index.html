<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stock Beta Calculator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      /* TradingView dark palette */
      --bg-page: #131722;
      --bg-card: #1e222d;
      --bg-elevated: #2a2e39;
      --bg-hover: #363a45;
      --bg-input: #2a2e39;
      --border: #363a45;
      --border-light: #2a2e39;
      --fg: #d1d4dc;
      --fg-bright: #e0e3eb;
      --fg-dim: #787b86;
      --fg-muted: #5d606b;
      --blue: #2962ff;
      --blue-hover: #1e53e5;
      --blue-bg: rgba(41,98,255,0.12);
      --green: #26a69a;
      --green-bg: rgba(38,166,154,0.12);
      --red: #ef5350;
      --red-bg: rgba(239,83,80,0.12);
      --orange: #ff9800;
      --radius: 4px;
      --radius-md: 6px;
      --radius-lg: 8px;
      --font: "Inter", -apple-system, "Trebuchet MS", Roboto, sans-serif;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: var(--font);
      background: var(--bg-page);
      color: var(--fg);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      font-size: 13px;
    }

    /* ── Top toolbar ─────────────────────── */
    .toolbar {
      background: var(--bg-card);
      border-bottom: 1px solid var(--border);
      padding: 0 20px;
      height: 49px;
      display: flex;
      align-items: center;
      gap: 16px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .toolbar-logo {
      font-size: 15px;
      font-weight: 700;
      color: var(--fg-bright);
      letter-spacing: -0.02em;
      white-space: nowrap;
    }
    .toolbar-logo span { color: var(--blue); }
    .toolbar-sep {
      width: 1px;
      height: 24px;
      background: var(--border);
    }
    .toolbar-subtitle {
      font-size: 12px;
      color: var(--fg-dim);
      font-weight: 500;
    }

    /* ── Main layout ─────────────────────── */
    .main {
      max-width: 900px;
      margin: 0 auto;
      padding: 20px;
    }

    /* ── Control bar (form) ──────────────── */
    .control-bar {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 16px 20px;
      display: flex;
      align-items: flex-end;
      gap: 12px;
      flex-wrap: wrap;
    }
    .control-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .control-group.ticker-group { flex: 1; min-width: 180px; }
    .control-group.filter-group { min-width: 120px; }
    .control-label {
      font-size: 11px;
      font-weight: 500;
      color: var(--fg-dim);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    input[type="text"] {
      padding: 7px 10px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--bg-input);
      color: var(--fg-bright);
      font-family: var(--font);
      font-size: 13px;
      font-weight: 500;
      text-transform: uppercase;
      outline: none;
      transition: border-color 0.15s;
      width: 100%;
    }
    input[type="text"]::placeholder {
      color: var(--fg-muted);
      text-transform: none;
      font-weight: 400;
    }
    input[type="text"]:focus { border-color: var(--blue); }
    select {
      padding: 7px 28px 7px 10px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--bg-input);
      color: var(--fg-bright);
      font-family: var(--font);
      font-size: 13px;
      font-weight: 500;
      outline: none;
      cursor: pointer;
      transition: border-color 0.15s;
      -webkit-appearance: none;
      appearance: none;
      background-image: url("data:image/svg+xml,%3Csvg width='8' height='5' viewBox='0 0 8 5' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l3 3 3-3' stroke='%23787b86' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
      background-repeat: no-repeat;
      background-position: right 8px center;
    }
    select:focus { border-color: var(--blue); }
    .btn-calculate {
      padding: 7px 20px;
      border-radius: var(--radius);
      border: none;
      background: var(--blue);
      color: #fff;
      font-family: var(--font);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
      height: 33px;
    }
    .btn-calculate:hover { background: var(--blue-hover); }
    .btn-calculate:disabled {
      background: var(--bg-elevated);
      color: var(--fg-muted);
      cursor: not-allowed;
    }

    /* ── Autocomplete ────────────────────── */
    .autocomplete-wrap { position: relative; }
    .ac-list {
      display: none;
      position: absolute;
      top: calc(100% + 2px);
      left: 0;
      right: 0;
      max-height: 240px;
      overflow-y: auto;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      z-index: 50;
      list-style: none;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    }
    .ac-list.open { display: block; }
    .ac-list li {
      padding: 7px 12px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      transition: background 0.08s;
    }
    .ac-list li:hover, .ac-list li.active { background: var(--bg-elevated); }
    .ac-ticker {
      font-weight: 600;
      color: var(--fg-bright);
      font-size: 12px;
    }
    .ac-name {
      color: var(--fg-dim);
      font-size: 11px;
      text-align: right;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* ── Error ────────────────────────────── */
    .error {
      margin-top: 12px;
      padding: 10px 14px;
      background: var(--red-bg);
      border: 1px solid rgba(239,83,80,0.3);
      border-radius: var(--radius);
      color: var(--red);
      font-size: 12px;
    }

    /* ── Results container ────────────────── */
    .results { margin-top: 16px; }

    /* ── Summary panel ────────────────────── */
    .summary-panel {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 20px;
      margin-bottom: 12px;
    }
    .summary-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }
    .summary-ticker-wrap {
      display: flex;
      align-items: baseline;
      gap: 10px;
    }
    .summary-ticker {
      font-size: 18px;
      font-weight: 700;
      color: var(--fg-bright);
    }
    .summary-meta {
      font-size: 11px;
      color: var(--fg-dim);
    }
    .beta-badge {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .beta-badge-label {
      font-size: 11px;
      font-weight: 500;
      color: var(--fg-dim);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .beta-badge-value {
      font-size: 32px;
      font-weight: 700;
      line-height: 1;
      letter-spacing: -0.02em;
    }
    .beta-low { color: var(--green); }
    .beta-neutral { color: var(--orange); }
    .beta-high { color: var(--red); }

    .stats-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1px;
      background: var(--border);
      border-radius: var(--radius-md);
      overflow: hidden;
    }
    .stat-cell {
      background: var(--bg-elevated);
      padding: 12px 14px;
      text-align: center;
    }
    .stat-cell-value {
      font-size: 15px;
      font-weight: 700;
      color: var(--fg-bright);
      margin-bottom: 2px;
    }
    .stat-cell-label {
      font-size: 10px;
      color: var(--fg-dim);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      font-weight: 500;
    }

    /* ── Interpretation ───────────────────── */
    .interpretation {
      margin-top: 12px;
      padding: 10px 14px;
      background: var(--blue-bg);
      border-radius: var(--radius-md);
      font-size: 12px;
      color: var(--fg);
      line-height: 1.55;
      border-left: 3px solid var(--blue);
    }

    /* ── CAPM panel ────────────────────────── */
    .capm-panel {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 20px;
      margin-bottom: 12px;
    }
    .capm-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }
    .capm-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--fg-bright);
    }
    .capm-formula-label {
      font-size: 11px;
      color: var(--fg-dim);
      font-style: italic;
    }
    .capm-equation {
      display: flex;
      align-items: center;
      gap: 24px;
      margin-bottom: 16px;
    }
    .capm-result {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-width: 120px;
      padding: 14px 20px;
      background: var(--bg-elevated);
      border-radius: var(--radius-md);
      border: 1px solid var(--border);
    }
    .capm-result-value {
      font-size: 24px;
      font-weight: 700;
      line-height: 1;
      letter-spacing: -0.02em;
    }
    .capm-result-label {
      font-size: 10px;
      color: var(--fg-dim);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      font-weight: 500;
      margin-top: 6px;
    }
    .capm-pos { color: var(--green); }
    .capm-neg { color: var(--red); }
    .capm-breakdown {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .capm-eq-row {
      background: var(--bg-elevated);
      border-radius: var(--radius);
      padding: 8px 14px;
      border: 1px solid var(--border-light);
    }
    .capm-eq-expr {
      font-size: 13px;
      color: var(--fg);
      font-variant-numeric: tabular-nums;
    }
    .capm-val {
      font-weight: 600;
      color: var(--fg-bright);
    }
    .capm-op {
      color: var(--fg-dim);
      margin: 0 3px;
    }
    .capm-inputs {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1px;
      background: var(--border);
      border-radius: var(--radius-md);
      overflow: hidden;
    }
    .capm-input-item {
      background: var(--bg-elevated);
      padding: 10px 12px;
      text-align: center;
    }
    .capm-input-val {
      display: block;
      font-size: 14px;
      font-weight: 700;
      color: var(--fg-bright);
      font-variant-numeric: tabular-nums;
    }
    .capm-input-lbl {
      display: block;
      font-size: 10px;
      color: var(--fg-dim);
      margin-top: 3px;
      font-weight: 500;
    }

    @media (max-width: 640px) {
      .capm-equation { flex-direction: column; }
      .capm-inputs { grid-template-columns: 1fr 1fr; }
      .capm-header { flex-direction: column; gap: 4px; }
    }

    /* ── Data table (screener-style) ─────── */
    .table-panel {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
    }
    .table-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 16px;
      border-bottom: 1px solid var(--border);
    }
    .table-toolbar-title {
      font-size: 12px;
      font-weight: 600;
      color: var(--fg);
    }
    .table-toolbar-count {
      font-size: 11px;
      color: var(--fg-dim);
    }
    .table-wrapper {
      max-height: 480px;
      overflow-y: auto;
    }
    .table-wrapper::-webkit-scrollbar { width: 5px; }
    .table-wrapper::-webkit-scrollbar-track { background: var(--bg-card); }
    .table-wrapper::-webkit-scrollbar-thumb { background: var(--bg-hover); border-radius: 3px; }
    .table-wrapper::-webkit-scrollbar-thumb:hover { background: var(--fg-muted); }

    .data-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }
    .data-table thead {
      position: sticky;
      top: 0;
      z-index: 2;
    }
    .data-table th {
      text-align: right;
      color: var(--fg-dim);
      font-weight: 500;
      font-size: 11px;
      padding: 6px 14px;
      background: var(--bg-card);
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
      cursor: pointer;
      user-select: none;
      transition: color 0.12s;
    }
    .data-table th:hover { color: var(--fg-bright); }
    .data-table th .sort-arrow {
      display: inline-block;
      margin-left: 3px;
      font-size: 8px;
      opacity: 0.35;
      transition: opacity 0.12s;
    }
    .data-table th.sort-active { color: var(--blue); }
    .data-table th.sort-active .sort-arrow { opacity: 1; color: var(--blue); }
    .data-table th:first-child { text-align: left; }
    .data-table td {
      padding: 5px 14px;
      color: var(--fg);
      border-bottom: 1px solid var(--border-light);
      text-align: right;
      white-space: nowrap;
      font-variant-numeric: tabular-nums;
    }
    .data-table td:first-child {
      text-align: left;
      color: var(--fg-dim);
      font-size: 11px;
    }
    .data-table tbody tr {
      transition: background 0.08s;
    }
    .data-table tbody tr:hover { background: var(--bg-elevated); }
    .data-table .chg-pos { color: var(--green); }
    .data-table .chg-neg { color: var(--red); }

    /* ── Pill-style change cells ─────────── */
    .chg-pill {
      display: inline-block;
      padding: 1px 6px;
      border-radius: 3px;
      font-weight: 500;
      font-size: 11px;
    }
    .chg-pill.pos { background: var(--green-bg); color: var(--green); }
    .chg-pill.neg { background: var(--red-bg); color: var(--red); }

    /* ── Spinner ──────────────────────────── */
    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255,255,255,0.25);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Responsive ───────────────────────── */
    @media (max-width: 640px) {
      .control-bar { flex-direction: column; align-items: stretch; }
      .control-group.filter-group { min-width: 0; }
      .btn-calculate { width: 100%; height: auto; padding: 10px; }
      .stats-row { grid-template-columns: 1fr 1fr; }
      .summary-top { flex-direction: column; gap: 12px; align-items: flex-start; }
      .table-wrapper { max-height: 360px; }
    }
  </style>
</head>
<body>
  <!-- TradingView-style top bar -->
  <div class="toolbar">
    <div class="toolbar-logo">Beta<span>Calc</span></div>
    <div class="toolbar-sep"></div>
    <div class="toolbar-subtitle">Stock Beta Calculator vs. S&P 500</div>
  </div>

  <div class="main">
    <!-- Control bar -->
    <form id="betaForm" class="control-bar">
      <div class="control-group ticker-group">
        <span class="control-label">Ticker</span>
        <div class="autocomplete-wrap">
          <input type="text" id="ticker" placeholder="Search symbol..." autocomplete="off" required value="AAPL">
          <ul class="ac-list" id="acList"></ul>
        </div>
      </div>
      <div class="control-group filter-group">
        <span class="control-label">Period</span>
        <select id="period">
          {% for value, label in periods.items() %}
          <option value="{{ value }}" {{ "selected" if value == "5y" }}>{{ label }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="control-group filter-group">
        <span class="control-label">Interval</span>
        <select id="interval">
          {% for value, label in intervals.items() %}
          <option value="{{ value }}" {{ "selected" if value == "1mo" }}>{{ label }}</option>
          {% endfor %}
        </select>
      </div>
      <button type="submit" id="submitBtn" class="btn-calculate">Calculate</button>
    </form>

    <div id="error" class="error" style="display:none"></div>
    <div id="results" class="results" style="display:none"></div>
  </div>

  <script>
    // ── Autocomplete ──────────────────────
    const tickerInput = document.getElementById("ticker");
    const acList = document.getElementById("acList");
    let sp500 = [];
    let acIndex = -1;

    fetch("/tickers").then(r => r.json()).then(data => { sp500 = data; });

    tickerInput.addEventListener("input", () => {
      const q = tickerInput.value.trim().toUpperCase();
      acIndex = -1;
      if (!q) { acList.classList.remove("open"); return; }
      const matches = sp500.filter(s =>
        s.ticker.startsWith(q) || s.name.toUpperCase().includes(q)
      ).slice(0, 8);
      if (!matches.length) { acList.classList.remove("open"); return; }
      acList.innerHTML = matches.map(s =>
        `<li data-ticker="${s.ticker}"><span class="ac-ticker">${s.ticker}</span><span class="ac-name">${s.name}</span></li>`
      ).join("");
      acList.classList.add("open");
    });

    acList.addEventListener("click", (e) => {
      const li = e.target.closest("li");
      if (!li) return;
      tickerInput.value = li.dataset.ticker;
      acList.classList.remove("open");
    });

    tickerInput.addEventListener("keydown", (e) => {
      const items = acList.querySelectorAll("li");
      if (!items.length || !acList.classList.contains("open")) return;
      if (e.key === "ArrowDown") {
        e.preventDefault();
        acIndex = Math.min(acIndex + 1, items.length - 1);
      } else if (e.key === "ArrowUp") {
        e.preventDefault();
        acIndex = Math.max(acIndex - 1, 0);
      } else if (e.key === "Enter" && acIndex >= 0) {
        e.preventDefault();
        tickerInput.value = items[acIndex].dataset.ticker;
        acList.classList.remove("open");
        return;
      } else if (e.key === "Escape") {
        acList.classList.remove("open");
        return;
      } else { return; }
      items.forEach((li, i) => li.classList.toggle("active", i === acIndex));
      items[acIndex].scrollIntoView({ block: "nearest" });
    });

    document.addEventListener("click", (e) => {
      if (!e.target.closest(".autocomplete-wrap")) acList.classList.remove("open");
    });

    // ── Form submit ───────────────────────
    const form = document.getElementById("betaForm");
    const btn = document.getElementById("submitBtn");
    const errorDiv = document.getElementById("error");
    const resultsDiv = document.getElementById("results");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const ticker = document.getElementById("ticker").value.trim();
      const period = document.getElementById("period").value;
      const interval = document.getElementById("interval").value;
      if (!ticker) return;

      errorDiv.style.display = "none";
      resultsDiv.style.display = "none";
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Loading';

      try {
        const res = await fetch("/calculate", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ ticker, period, interval }),
        });
        const data = await res.json();
        if (!res.ok) {
          errorDiv.textContent = data.error || "Something went wrong.";
          errorDiv.style.display = "block";
          return;
        }
        showResults(data);
      } catch {
        errorDiv.textContent = "Network error. Please try again.";
        errorDiv.style.display = "block";
      } finally {
        btn.disabled = false;
        btn.textContent = "Calculate";
      }
    });

    // ── Helpers ────────────────────────────
    function betaClass(b) {
      const abs = Math.abs(b);
      if (abs < 0.8) return "beta-low";
      if (abs <= 1.2) return "beta-neutral";
      return "beta-high";
    }

    function interpret(b) {
      const abs = Math.abs(b);
      if (abs < 0.5) return "Very low sensitivity to market movements. This stock behaves largely independently of the S&P 500.";
      if (abs < 0.8) return "Below-average market sensitivity. This stock tends to move less than the overall market.";
      if (abs <= 1.2) return "Roughly in line with the market. This stock moves similarly to the S&P 500.";
      if (abs <= 1.5) return "Above-average market sensitivity. This stock amplifies market movements.";
      return "High market sensitivity. This stock is significantly more volatile than the S&P 500.";
    }

    // ── Sort state ────────────────────────
    let currentData = null;
    let sortCol = "date";
    let sortAsc = false;

    const COLUMNS = [
      { key: "date",         label: "Date" },
      { key: "stock_price",  labelFn: d => `${d.ticker} Price` },
      { key: "stock_chg",    labelFn: d => `${d.ticker} Chg%` },
      { key: "market_price", label: "S&P 500" },
      { key: "market_chg",   label: "S&P 500 Chg%" },
    ];

    function renderTableRows(rows) {
      const sorted = [...rows].sort((a, b) => {
        const av = a[sortCol], bv = b[sortCol];
        if (av < bv) return sortAsc ? -1 : 1;
        if (av > bv) return sortAsc ? 1 : -1;
        return 0;
      });
      return sorted.map(r => {
        const sPill = r.stock_chg >= 0 ? 'pos' : 'neg';
        const mPill = r.market_chg >= 0 ? 'pos' : 'neg';
        return `
        <tr>
          <td>${r.date}</td>
          <td>$${r.stock_price.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}</td>
          <td><span class="chg-pill ${sPill}">${r.stock_chg >= 0 ? '+' : ''}${r.stock_chg.toFixed(2)}%</span></td>
          <td>$${r.market_price.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}</td>
          <td><span class="chg-pill ${mPill}">${r.market_chg >= 0 ? '+' : ''}${r.market_chg.toFixed(2)}%</span></td>
        </tr>`;
      }).join('');
    }

    function renderTableHead(d) {
      return COLUMNS.map(c => {
        const lbl = c.labelFn ? c.labelFn(d) : c.label;
        const active = sortCol === c.key;
        const arrow = active ? (sortAsc ? '\u25B2' : '\u25BC') : '\u25B4';
        return `<th data-sort="${c.key}" class="${active ? 'sort-active' : ''}">${lbl}<span class="sort-arrow">${arrow}</span></th>`;
      }).join('');
    }

    function showResults(d) {
      currentData = d;
      sortCol = "date";
      sortAsc = false;

      resultsDiv.innerHTML = `
        <div class="summary-panel">
          <div class="summary-top">
            <div class="summary-ticker-wrap">
              <span class="summary-ticker">${d.ticker}</span>
              <span class="summary-meta">${d.period} \u00b7 ${d.interval} \u00b7 ${d.data_points} pts</span>
            </div>
            <div class="beta-badge">
              <span class="beta-badge-label">Beta</span>
              <span class="beta-badge-value ${betaClass(d.beta)}">${d.beta.toFixed(2)}</span>
            </div>
          </div>
          <div class="stats-row">
            <div class="stat-cell">
              <div class="stat-cell-value">${d.avg_stock_return >= 0 ? '+' : ''}${d.avg_stock_return.toFixed(3)}%</div>
              <div class="stat-cell-label">Avg ${d.ticker} Return<br>(${d.interval_label})</div>
            </div>
            <div class="stat-cell">
              <div class="stat-cell-value">${d.stock_vol_period.toFixed(3)}%</div>
              <div class="stat-cell-label">${d.ticker} Vol.<br>(${d.interval_label})</div>
            </div>
            <div class="stat-cell">
              <div class="stat-cell-value">${d.avg_market_return >= 0 ? '+' : ''}${d.avg_market_return.toFixed(3)}%</div>
              <div class="stat-cell-label">Avg Market Return<br>(${d.interval_label})</div>
            </div>
            <div class="stat-cell">
              <div class="stat-cell-value">${d.market_vol_period.toFixed(3)}%</div>
              <div class="stat-cell-label">Market Vol.<br>(${d.interval_label})</div>
            </div>
          </div>
          <div class="stats-row" style="margin-top:1px;">
            <div class="stat-cell">
              <div class="stat-cell-value">${d.correlation.toFixed(2)}</div>
              <div class="stat-cell-label">Correlation</div>
            </div>
            <div class="stat-cell">
              <div class="stat-cell-value">${d.stock_volatility.toFixed(1)}%</div>
              <div class="stat-cell-label">Stock Vol.<br>(Annualized)</div>
            </div>
            <div class="stat-cell">
              <div class="stat-cell-value">${d.market_volatility.toFixed(1)}%</div>
              <div class="stat-cell-label">Market Vol.<br>(Annualized)</div>
            </div>
            <div class="stat-cell">
              <div class="stat-cell-value">${(d.stock_volatility / d.market_volatility).toFixed(2)}x</div>
              <div class="stat-cell-label">Rel. Vol.</div>
            </div>
          </div>
          <div class="interpretation">${interpret(d.beta)}</div>
        </div>
        <div class="capm-panel">
          <div class="capm-header">
            <span class="capm-title">CAPM</span>
            <span class="capm-formula-label">E(R) = R<sub>f</sub> + &beta; &times; (R<sub>m</sub> &minus; R<sub>f</sub>)</span>
          </div>
          <div class="capm-equation">
            <div class="capm-result">
              <span class="capm-result-value ${d.capm_expected_return >= 0 ? 'capm-pos' : 'capm-neg'}">${d.capm_expected_return >= 0 ? '+' : ''}${d.capm_expected_return.toFixed(2)}%</span>
              <span class="capm-result-label">Expected Annual Return</span>
            </div>
            <div class="capm-breakdown">
              <div class="capm-eq-row">
                <span class="capm-eq-expr">
                  <span class="capm-val">${d.rf_annual.toFixed(2)}%</span>
                  <span class="capm-op">+</span>
                  <span class="capm-val">${d.beta.toFixed(2)}</span>
                  <span class="capm-op">&times;</span>
                  <span class="capm-op">(</span>
                  <span class="capm-val">${d.market_ann_return >= 0 ? '+' : ''}${d.market_ann_return.toFixed(2)}%</span>
                  <span class="capm-op">&minus;</span>
                  <span class="capm-val">${d.rf_annual.toFixed(2)}%</span>
                  <span class="capm-op">)</span>
                </span>
              </div>
            </div>
          </div>
          <div class="capm-inputs">
            <div class="capm-input-item">
              <span class="capm-input-val">${d.rf_annual.toFixed(2)}%</span>
              <span class="capm-input-lbl">R<sub>f</sub> (10Y Treasury)</span>
            </div>
            <div class="capm-input-item">
              <span class="capm-input-val">${d.beta.toFixed(2)}</span>
              <span class="capm-input-lbl">&beta; (Beta)</span>
            </div>
            <div class="capm-input-item">
              <span class="capm-input-val">${d.market_ann_return >= 0 ? '+' : ''}${d.market_ann_return.toFixed(2)}%</span>
              <span class="capm-input-lbl">R<sub>m</sub> (Market Ann. Return)</span>
            </div>
            <div class="capm-input-item">
              <span class="capm-input-val">${d.equity_risk_premium >= 0 ? '+' : ''}${d.equity_risk_premium.toFixed(2)}%</span>
              <span class="capm-input-lbl">ERP (R<sub>m</sub> &minus; R<sub>f</sub>)</span>
            </div>
          </div>
        </div>
        <div class="table-panel">
          <div class="table-toolbar">
            <span class="table-toolbar-title">Price Data</span>
            <span class="table-toolbar-count">${d.data_points} rows</span>
          </div>
          <div class="table-wrapper">
            <table class="data-table" id="dataTable">
              <thead><tr>${renderTableHead(d)}</tr></thead>
              <tbody>${renderTableRows(d.table)}</tbody>
            </table>
          </div>
        </div>
      `;
      resultsDiv.style.display = "block";

      document.getElementById("dataTable").querySelector("thead").addEventListener("click", (e) => {
        const th = e.target.closest("th");
        if (!th) return;
        const col = th.dataset.sort;
        if (sortCol === col) {
          sortAsc = !sortAsc;
        } else {
          sortCol = col;
          sortAsc = col === "date";
        }
        const table = document.getElementById("dataTable");
        table.querySelector("thead tr").innerHTML = renderTableHead(currentData);
        table.querySelector("tbody").innerHTML = renderTableRows(currentData.table);
      });
    }

    // Auto-calculate on page load with defaults
    window.addEventListener("DOMContentLoaded", () => {
      form.requestSubmit();
    });
  </script>
</body>
</html>
